claim_support: >-
  The FAQ states: "To fully delete something ChatGPT may know about you, you'll need to
  delete every source where it appears, including past chats, archived chats, files, the
  memory summary, and disconnect any connected apps." Also: deleting memories and turning
  memory off "does not delete your past chats", and re-enabling "may create new memories from
  chats that remain". Supports that deletion is non-trivial and multi-surface. Directly
  relevant to trust/control; not tested behaviourally.
